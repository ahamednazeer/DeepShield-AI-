name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend (AMD64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ahamednazeer/deepshield-ai:be-latest
            ahamednazeer/deepshield-ai:be-${{ github.sha }}

      - name: Build and Push Backend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ahamednazeer/deepshield-ai:be-arm64-latest
            ahamednazeer/deepshield-ai:be-arm64-${{ github.sha }}

  frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend (AMD64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ahamednazeer/deepshield-ai:fe-latest
            ahamednazeer/deepshield-ai:fe-${{ github.sha }}

      - name: Build and Push Frontend (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ahamednazeer/deepshield-ai:fe-arm64-latest
            ahamednazeer/deepshield-ai:fe-arm64-${{ github.sha }}